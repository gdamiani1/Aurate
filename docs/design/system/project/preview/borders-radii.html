<!doctype html>
<html><head><meta charset="utf-8"><title>Borders & Radii</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow-mini">── BORDER / RADIUS · SHARP CORNERS, HAIRLINE BORDERS</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">
    <div>
      <div style="height:80px;background:var(--ink-2);border:1px solid var(--border);"></div>
      <div class="token-name" style="margin-top:8px;">HAIRLINE</div>
      <div class="token-value">1px solid #252520</div>
    </div>
    <div>
      <div style="height:80px;background:var(--ink-2);border:1px solid var(--hazard-25);"></div>
      <div class="token-name" style="margin-top:8px;">HAZARD HAIRLINE</div>
      <div class="token-value">1px · hazard 25%</div>
    </div>
    <div>
      <div style="height:80px;background:var(--ink-2);border:2px dashed var(--hazard);"></div>
      <div class="token-name" style="margin-top:8px;">DASHED CUSTOMS</div>
      <div class="token-value">2px dashed hazard · rejects only</div>
    </div>
    <div>
      <div style="height:80px;background:var(--ink-2);border:1px solid var(--border);border-radius:0;"></div>
      <div class="token-name" style="margin-top:8px;">RADIUS</div>
      <div class="token-value">0 · sharp · always</div>
    </div>
  </div>
  <div style="margin-top:16px;font-family:var(--font-mono);font-size:10px;color:var(--ghost);line-height:1.6;letter-spacing:0.05em;">no drop shadows. no rounded corners. cards earn their place with hairlines, not depth.</div>
</div></body></html>
