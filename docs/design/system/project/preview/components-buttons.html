<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow-mini">── COMPONENT / BUTTONS</div>
  <div style="display:flex;flex-direction:column;gap:14px;">

    <div style="display:flex;gap:10px;align-items:center;">
      <button style="background:var(--hazard);border:none;padding:14px 22px;font-family:var(--font-mono);font-weight:700;font-size:12px;letter-spacing:0.2em;color:var(--ink);cursor:pointer;">↗ SHARE</button>
      <div class="token-value" style="color:var(--paper-mute);">PRIMARY · hazard fill · ink text</div>
    </div>

    <div style="display:flex;gap:10px;align-items:center;">
      <button style="background:transparent;border:1px solid var(--border);padding:14px 22px;font-family:var(--font-mono);font-weight:700;font-size:12px;letter-spacing:0.2em;color:var(--paper-mute);cursor:pointer;">DISMISS</button>
      <div class="token-value" style="color:var(--paper-mute);">SECONDARY · hairline · paper-mute text</div>
    </div>

    <div style="display:flex;gap:10px;align-items:center;">
      <button style="background:transparent;border:none;padding:14px 0;font-family:var(--font-mono);font-weight:700;font-size:11px;letter-spacing:0.2em;color:var(--ghost);cursor:pointer;">OR PICK FROM GALLERY →</button>
      <div class="token-value" style="color:var(--paper-mute);">GHOST · text-only · ghost color</div>
    </div>

    <div style="display:flex;gap:10px;align-items:center;">
      <button style="background:rgba(255,59,48,0.12);border:1px solid var(--blood);padding:14px 22px;font-family:var(--font-mono);font-weight:700;font-size:12px;letter-spacing:0.2em;color:var(--blood);cursor:pointer;">DECLINE</button>
      <div class="token-value" style="color:var(--paper-mute);">DESTRUCTIVE · blood tint · blood text</div>
    </div>

    <div style="display:flex;gap:10px;align-items:center;">
      <button disabled style="background:var(--ink-2);border:1px solid var(--border);padding:14px 22px;font-family:var(--font-mono);font-weight:700;font-size:12px;letter-spacing:0.2em;color:var(--ghost);cursor:not-allowed;">LOCKED · 3/3 USED</button>
      <div class="token-value" style="color:var(--paper-mute);">LOCKED · ghost text · ink-2 fill</div>
    </div>

  </div>
</div></body></html>
