<!doctype html>
<html><head><meta charset="utf-8"><title>Result Card</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="padding:24px;">
  <div class="eyebrow-mini">── COMPONENT / RESULT CARD · 9:16 SHAREABLE</div>
  <div style="width:340px;height:604px;background:var(--ink-2);position:relative;border:1px solid var(--border);overflow:hidden;font-family:var(--font-mono);">

    <div style="position:absolute;inset:0;background:linear-gradient(180deg,#5a5a5a 0%,#2a2a2a 70%,#0A0A0A 100%);"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 35%,rgba(10,10,10,0.95) 75%,#0A0A0A 100%);"></div>

    <div style="position:absolute;top:8px;left:8px;width:22px;height:22px;border-top:1px solid var(--hazard);border-left:1px solid var(--hazard);"></div>
    <div style="position:absolute;top:8px;right:8px;width:22px;height:22px;border-top:1px solid var(--hazard);border-right:1px solid var(--hazard);"></div>
    <div style="position:absolute;bottom:8px;left:8px;width:22px;height:22px;border-bottom:1px solid var(--hazard);border-left:1px solid var(--hazard);"></div>
    <div style="position:absolute;bottom:8px;right:8px;width:22px;height:22px;border-bottom:1px solid var(--hazard);border-right:1px solid var(--hazard);"></div>

    <div style="position:absolute;top:18px;left:18px;right:18px;display:flex;justify-content:space-between;font-size:9px;letter-spacing:0.2em;color:var(--paper);">
      <span>MOGSTER<span style="color:var(--hazard);">.</span></span>
      <span style="color:var(--paper-mute);">N°02947 · 04.28.26</span>
    </div>

    <div style="position:absolute;top:64px;left:18px;background:var(--hazard);padding:4px 8px;transform:rotate(-2deg);font-weight:700;font-size:9px;color:var(--ink);letter-spacing:0.15em;">• AURAMAXXING</div>

    <div style="position:absolute;bottom:24px;left:18px;right:18px;">
      <div style="font-weight:700;font-size:9px;letter-spacing:0.25em;color:var(--hazard);margin-bottom:4px;">▌ AURA</div>
      <div style="font-family:var(--font-display);font-size:138px;line-height:0.78;letter-spacing:-0.06em;color:var(--paper);text-transform:uppercase;padding-top:10px;">874</div>
      <div style="font-family:var(--font-display);font-size:24px;letter-spacing:0.04em;color:var(--hazard);text-transform:uppercase;margin-top:4px;">HIM / HER</div>
      <div style="height:1px;background:var(--hazard-25);margin:14px 0 12px;"></div>
      <div style="font-size:11px;line-height:1.5;color:var(--paper-mute);">"the kitchen's open. you cooked. mid-tier mogger energy with a sigma kicker — keep building, no cap."</div>
    </div>

  </div>
</div></body></html>
