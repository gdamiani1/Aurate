<!doctype html>
<html><head><meta charset="utf-8"><title>Chips & Tabs</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow-mini">── COMPONENT / CHIPS · TABS · INSTANT-FILL SELECTED</div>

  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;">
    <div style="display:flex;align-items:center;gap:8px;background:var(--hazard);border:1px solid var(--hazard);padding:10px 14px;"><span style="font-family:var(--font-mono);font-size:9px;color:var(--ink);opacity:0.7;letter-spacing:0.12em;">01</span><span style="font-family:var(--font-display);font-size:15px;color:var(--ink);letter-spacing:-0.02em;padding-top:2px;">AURAMAXXING</span></div>
    <div style="display:flex;align-items:center;gap:8px;background:var(--ink-2);border:1px solid var(--border);padding:10px 14px;"><span style="font-family:var(--font-mono);font-size:9px;color:var(--ghost);letter-spacing:0.12em;">02</span><span style="font-family:var(--font-display);font-size:15px;color:var(--paper);letter-spacing:-0.02em;padding-top:2px;">LOOKSMAXXING</span></div>
    <div style="display:flex;align-items:center;gap:8px;background:var(--ink-2);border:1px solid var(--border);padding:10px 14px;"><span style="font-family:var(--font-mono);font-size:9px;color:var(--ghost);letter-spacing:0.12em;">03</span><span style="font-family:var(--font-display);font-size:15px;color:var(--paper);letter-spacing:-0.02em;padding-top:2px;">MOGGER MODE</span></div>
  </div>

  <div style="display:flex;border:1px solid var(--border);">
    <div style="flex:1;padding:12px;text-align:center;background:var(--hazard);border-right:1px solid var(--border);font-family:var(--font-mono);font-weight:700;font-size:10px;letter-spacing:0.18em;color:var(--ink);">GLOBAL</div>
    <div style="flex:1;padding:12px;text-align:center;border-right:1px solid var(--border);font-family:var(--font-mono);font-weight:700;font-size:10px;letter-spacing:0.18em;color:var(--ghost);">BY PATH</div>
    <div style="flex:1;padding:12px;text-align:center;font-family:var(--font-mono);font-weight:700;font-size:10px;letter-spacing:0.18em;color:var(--ghost);">YOUR CIRCLE</div>
  </div>
</div></body></html>
