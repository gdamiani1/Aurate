<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow-mini">── COMPONENT / INPUTS</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">

    <div>
      <div class="token-name" style="margin-bottom:6px;">USERNAME</div>
      <div style="background:var(--ink-2);border:1px solid var(--border);padding:14px;font-family:var(--font-mono);font-size:13px;color:var(--paper);">@yougotmogged</div>
    </div>

    <div>
      <div class="token-name" style="margin-bottom:6px;">DOB</div>
      <div style="background:var(--ink-2);border:1px solid var(--hazard);padding:14px;font-family:var(--font-mono);font-size:13px;color:var(--hazard);display:flex;justify-content:space-between;"><span>04 / 12 / 2008</span><span style="color:var(--ghost);">▼</span></div>
    </div>

    <div>
      <div class="token-name" style="margin-bottom:6px;">CHECKBOX (16+)</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:18px;height:18px;background:var(--hazard);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:13px;color:var(--ink);font-weight:700;">✓</div>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--paper);">i'm 16+ no cap</span>
      </div>
    </div>

    <div>
      <div class="token-name" style="margin-bottom:6px;">TOGGLE</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:36px;height:18px;background:var(--hazard);position:relative;"><div style="position:absolute;top:1px;right:1px;width:16px;height:16px;background:var(--ink);"></div></div>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--paper);">push notifs · ON</span>
      </div>
    </div>

  </div>
</div></body></html>
