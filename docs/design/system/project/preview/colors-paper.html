<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Paper</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow-mini">── COLOR / PAPER (TEXT ON DARK)</div>
  <div class="card-row">
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
      <div style="height:84px;background:var(--paper);"></div>
      <div class="token-name">PAPER</div>
      <div class="token-value">#F5F1E6 · --paper</div>
      <div class="token-value" style="color:var(--paper-mute);">primary text · never pure white</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
      <div style="height:84px;background:var(--paper-mute);"></div>
      <div class="token-name">PAPER MUTE</div>
      <div class="token-value">#A8A89B · --paper-mute</div>
      <div class="token-value" style="color:var(--paper-mute);">secondary text</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
      <div style="height:84px;background:var(--ghost);"></div>
      <div class="token-name">GHOST</div>
      <div class="token-value">#6B6B5E · --ghost</div>
      <div class="token-value" style="color:var(--paper-mute);">metadata · "less than"</div>
    </div>
  </div>
</div></body></html>
