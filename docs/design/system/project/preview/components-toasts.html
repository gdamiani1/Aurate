<!doctype html>
<html><head><meta charset="utf-8"><title>Toasts</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow-mini">── COMPONENT / TOASTS</div>
  <div style="display:flex;flex-direction:column;gap:10px;">

    <div style="background:var(--mint);padding:14px 16px;display:flex;align-items:center;gap:14px;border-left:4px solid var(--ink);">
      <div style="font-family:var(--font-display);font-size:22px;color:var(--ink);letter-spacing:-0.02em;padding-top:2px;">W SECURED</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink);">card saved to your camera roll</div>
    </div>

    <div style="background:var(--blood);padding:14px 16px;display:flex;align-items:center;gap:14px;border-left:4px solid var(--paper);">
      <div style="font-family:var(--font-display);font-size:22px;color:var(--paper);letter-spacing:-0.02em;padding-top:2px;">L DETECTED</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--paper);">failed to save card · check permissions</div>
    </div>

    <div style="background:var(--hazard);padding:14px 16px;display:flex;align-items:center;gap:14px;border-left:4px solid var(--ink);">
      <div style="font-family:var(--font-display);font-size:22px;color:var(--ink);letter-spacing:-0.02em;padding-top:2px;">⚔ INCOMING</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink);">@sigmaszn challenged you · auramaxxing</div>
    </div>

  </div>
</div></body></html>
