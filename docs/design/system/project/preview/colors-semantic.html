<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Semantic</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow-mini">── COLOR / SEMANTIC</div>
  <div class="card-row">
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
      <div style="height:84px;background:var(--mint);position:relative;">
        <div style="position:absolute;bottom:8px;left:10px;font-family:var(--font-display);font-size:28px;color:var(--ink);letter-spacing:-0.04em;">HIGH</div>
      </div>
      <div class="token-name">MINT</div>
      <div class="token-value">#7FFFA1 · --mint</div>
      <div class="token-value" style="color:var(--paper-mute);">wins · top-tier scores</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
      <div style="height:84px;background:var(--blood);position:relative;">
        <div style="position:absolute;bottom:8px;left:10px;font-family:var(--font-display);font-size:28px;color:var(--paper);letter-spacing:-0.04em;">LOSS</div>
      </div>
      <div class="token-name">BLOOD</div>
      <div class="token-value">#FF3B30 · --blood</div>
      <div class="token-value" style="color:var(--paper-mute);">errors · low-tier scores · L</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
      <div style="height:84px;background:var(--border);border:1px solid var(--border);"></div>
      <div class="token-name">BORDER</div>
      <div class="token-value">#252520 · --border</div>
      <div class="token-value" style="color:var(--paper-mute);">hairlines · 1px always</div>
    </div>
  </div>
</div></body></html>
