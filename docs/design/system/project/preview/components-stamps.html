<!doctype html>
<html><head><meta charset="utf-8"><title>Stamps</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow-mini">── COMPONENT / STAMPS · BADGES</div>
  <div style="display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;">

    <div style="background:var(--hazard);padding:6px 10px;transform:rotate(-2deg);box-shadow:3px 3px 0 rgba(0,0,0,0.4);">
      <span style="font-family:var(--font-mono);font-weight:700;font-size:10px;color:var(--ink);letter-spacing:0.15em;">• AURAMAXXING</span>
    </div>

    <div style="border:2px solid var(--hazard);padding:6px 10px;transform:rotate(-3deg);">
      <span style="font-family:var(--font-mono);font-weight:700;font-size:10px;color:var(--hazard);letter-spacing:0.15em;">RETURN TO SENDER</span>
    </div>

    <div style="background:var(--blood);padding:6px 10px;">
      <span style="font-family:var(--font-mono);font-weight:700;font-size:10px;color:var(--paper);letter-spacing:0.18em;">L · MOGGED</span>
    </div>

    <div style="background:var(--mint);padding:6px 10px;">
      <span style="font-family:var(--font-mono);font-weight:700;font-size:10px;color:var(--ink);letter-spacing:0.18em;">W · SECURED</span>
    </div>

    <div style="background:var(--hazard);padding:6px 10px;">
      <span style="font-family:var(--font-mono);font-weight:700;font-size:10px;color:var(--ink);letter-spacing:0.18em;">+1.5× AURA</span>
    </div>

    <div style="border:1px solid var(--hazard);padding:6px 10px;">
      <span style="font-family:var(--font-mono);font-weight:700;font-size:10px;color:var(--hazard);letter-spacing:0.18em;">◉ LATEST AURA</span>
    </div>

    <div style="background:var(--ink-2);border:1px solid var(--border);padding:6px 10px;">
      <span style="font-family:var(--font-mono);font-weight:700;font-size:10px;color:var(--paper-mute);letter-spacing:0.18em;">#02947 · 04.28.26</span>
    </div>

  </div>
</div></body></html>
